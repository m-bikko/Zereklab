<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="url(#defaultGradient)" />
  <defs>
    <linearGradient id="defaultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- ZerekLab Logo -->
  <g transform="translate(128, 128)">
    <!-- Main container -->
    <rect x="0" y="50" width="256" height="200" rx="30" fill="white" opacity="0.95"/>
    <rect x="20" y="70" width="216" height="160" rx="20" fill="#1f2937"/>
    
    <!-- Central circuit pattern -->
    <g stroke="white" stroke-width="3" fill="none" opacity="0.8">
      <!-- Main circuit lines -->
      <path d="M60 140 L100 140 L120 120 L140 140 L180 140" />
      <path d="M60 180 L100 180 L120 200 L140 180 L180 180" />
      <path d="M120 100 L120 140" />
      <path d="M120 180 L120 220" />
      
      <!-- Connection nodes -->
      <circle cx="80" cy="140" r="6" fill="#3b82f6"/>
      <circle cx="160" cy="140" r="6" fill="#10b981"/>
      <circle cx="80" cy="180" r="6" fill="#f59e0b"/>
      <circle cx="160" cy="180" r="6" fill="#ef4444"/>
      <circle cx="120" cy="160" r="8" fill="#8b5cf6"/>
    </g>
    
    <!-- STEM Elements -->
    <g fill="white" opacity="0.9">
      <!-- Science beaker -->
      <path d="M50 100 L70 100 L75 120 L45 120 Z" />
      <circle cx="60" cy="95" r="3" />
      
      <!-- Technology gear -->
      <circle cx="190" cy="105" r="15" fill="none" stroke="white" stroke-width="3"/>
      <circle cx="190" cy="105" r="8" fill="white"/>
      
      <!-- Engineering tools -->
      <rect x="45" y="200" width="20" height="3" />
      <rect x="55" y="190" width="3" height="20" />
      
      <!-- Math symbols -->
      <text x="180" y="210" font-family="Arial" font-size="20" font-weight="bold">π</text>
      <text x="200" y="210" font-family="Arial" font-size="16">²</text>
    </g>
  </g>
  
  <!-- Text elements -->
  <text x="256" y="360" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    ZerekLab
  </text>
  <text x="256" y="390" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" opacity="0.9">
    STEM Образование
  </text>
  <text x="256" y="420" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" opacity="0.7">
    Технологии • Наука • Инженерия • Математика
  </text>
</svg> 