<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="url(#gradient)" />
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Robot Icon -->
  <g transform="translate(156, 156)">
    <rect x="0" y="50" width="200" height="150" rx="25" fill="white" opacity="0.9"/>
    <rect x="20" y="70" width="160" height="110" rx="15" fill="#1f2937"/>
    
    <!-- Eyes -->
    <circle cx="70" cy="110" r="15" fill="#3b82f6"/>
    <circle cx="130" cy="110" r="15" fill="#3b82f6"/>
    
    <!-- Mouth -->
    <rect x="80" y="140" width="40" height="8" rx="4" fill="#ef4444"/>
    
    <!-- Antenna -->
    <rect x="95" y="20" width="10" height="30" fill="white" opacity="0.9"/>
    <circle cx="100" cy="20" r="8" fill="#ef4444"/>
    
    <!-- Arms -->
    <rect x="-20" y="100" width="20" height="60" rx="10" fill="white" opacity="0.9"/>
    <rect x="200" y="100" width="20" height="60" rx="10" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    ZerekLab STEM
  </text>
  <text x="256" y="410" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" opacity="0.8">
    Образование будущего
  </text>
</svg> 