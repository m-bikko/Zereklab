<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="url(#gradient2)" />
  <defs>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circuit Board Pattern -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.3">
    <!-- Horizontal lines -->
    <line x1="50" y1="100" x2="150" y2="100"/>
    <line x1="200" y1="150" x2="300" y2="150"/>
    <line x1="100" y1="300" x2="250" y2="300"/>
    <line x1="350" y1="200" x2="450" y2="200"/>
    
    <!-- Vertical lines -->
    <line x1="150" y1="100" x2="150" y2="200"/>
    <line x1="300" y1="150" x2="300" y2="250"/>
    <line x1="200" y1="250" x2="200" y2="350"/>
    <line x1="400" y1="100" x2="400" y2="300"/>
    
    <!-- Connection points -->
    <circle cx="150" cy="100" r="4" fill="white"/>
    <circle cx="300" cy="150" r="4" fill="white"/>
    <circle cx="200" cy="300" r="4" fill="white"/>
    <circle cx="400" cy="200" r="4" fill="white"/>
  </g>
  
  <!-- Main Electronics Icon -->
  <g transform="translate(206, 156)">
    <!-- Chip -->
    <rect x="0" y="0" width="100" height="100" rx="10" fill="white" opacity="0.9"/>
    <rect x="10" y="10" width="80" height="80" rx="5" fill="#1f2937"/>
    
    <!-- Pins -->
    <rect x="-5" y="25" width="10" height="8" fill="white"/>
    <rect x="-5" y="40" width="10" height="8" fill="white"/>
    <rect x="-5" y="55" width="10" height="8" fill="white"/>
    
    <rect x="95" y="25" width="10" height="8" fill="white"/>
    <rect x="95" y="40" width="10" height="8" fill="white"/>
    <rect x="95" y="55" width="10" height="8" fill="white"/>
    
    <rect x="25" y="-5" width="8" height="10" fill="white"/>
    <rect x="40" y="-5" width="8" height="10" fill="white"/>
    <rect x="55" y="-5" width="8" height="10" fill="white"/>
    
    <rect x="25" y="95" width="8" height="10" fill="white"/>
    <rect x="40" y="95" width="8" height="10" fill="white"/>
    <rect x="55" y="95" width="8" height="10" fill="white"/>
    
    <!-- Internal pattern -->
    <circle cx="30" cy="30" r="8" fill="#3b82f6"/>
    <circle cx="70" cy="30" r="8" fill="#ef4444"/>
    <circle cx="30" cy="70" r="8" fill="#10b981"/>
    <circle cx="70" cy="70" r="8" fill="#f59e0b"/>
    
    <!-- Center LED -->
    <circle cx="50" cy="50" r="6" fill="#fbbf24"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    ZerekLab Electronics
  </text>
  <text x="256" y="410" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" opacity="0.8">
    Изучаем схемы и микросхемы
  </text>
</svg> 